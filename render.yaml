services:
  - type: web
    name: aurascribe
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: aurascribe-db
          property: connectionString

databases:
  - name: aurascribe-db
    plan: free
